{% extends 'auth/base.html' %}
{% load static %}
{% block css %}
  <link rel="stylesheet" href="{% static 'auth/css/login.css' %}" />
{% endblock %}
{% block title %}Login{% endblock %}

{% block content %}
<html>
  <head>
    <title>Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="{% static 'auth/css/login.css' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"/>
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <h1>Login</h1>
        <hr class="login-divider" />

        <form id="login-form" method="POST" action="{% url 'login' %}">
          {% csrf_token %}

          {% if error %}
            <p style="color: red;">{{ error }}</p>
          {% endif %}

          <div class="form-group">
            <label for="username_or_email">Username/email</label>
            <input id="username_or_email" type="text" name="username_or_email" maxlength="20" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" required />
          </div>

          <button type="submit" class="login-btn">Login</button>
        </form>

        <p class="signup-link">
          Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
        </p>
      </div>
    </div>

  </body>
</html>
{% endblock %}
