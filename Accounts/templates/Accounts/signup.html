{% extends 'recipes/base.html' %}
{% load static %}
{% block css %}
    <link rel="stylesheet" type="text/css" href="{% static 'auth/css/signup.css' %}" />
{% endblock %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<html>
  <body>
    <div class="signup-container">
      <div class="signup-card">
        <h1>Sign Up</h1>
        <hr class="signup-divider" />

        <form id="signup-form" method="POST" action="{% url 'signup' %}">
          {% csrf_token %}

          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" name="username" maxlength="20" value="{{old_username}}" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" value="{{old_email}}" required />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" name="password" required />
          </div>

          <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" type="password" name="confirm_password" required />
          </div>
          
          {% if error %}
            <p style="color: red; font-size: 12px;">{{ error }}</p>
          {% endif %}
          <br>


          <div class="role-section">
            <p>Select Account Type</p>
            <div class="role-options">
              <label class="role-option" for="role-user">
                <input id="role-user" type="radio" name="is_admin" value="user" />
                User
              </label>
              <label class="role-option" for="role-admin">
                <input id="role-admin" type="radio" name="is_admin" value="admin" />
                Admin
              </label>
            </div>
          </div>

          <button type="submit" class="signup-btn">Create account</button>
        </form>

        <p class="login-link">
          Already have an account? <a href="{% url 'login' %}">Login</a>
        </p>
      </div>
    </div>

    <script src="{% static 'auth/js/signup.js' %}"></script>
  </body>
</html>
{% endblock %}
